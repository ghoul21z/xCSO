version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: xocs_postgres_db
    restart: always
    environment:
      POSTGRES_USER: xocs_user
      POSTGRES_PASSWORD: xocs_password
      POSTGRES_DB: xocs_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
